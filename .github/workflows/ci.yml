name: My CI workflow

on: 
  push:    
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs: 
  hello: 
    name: My Hello job
    runs-on: ubuntu-latest 
    steps:
      - name: Print Hello world
        run: echo "Hello World" 
      - name: Second step 
        run: echo "Second"
  
  goodbye: 
    name: My Farewell job
    needs: hello
    runs-on: windows-latest
    steps: 
      - name: Print farewell 
        run: echo "Goodbye"
  linting: 
    name: Run the linter
    runs-on: windows-latest
    steps:
      - name: Install the linter package
        run: pip install ruff
      - name: Run ruff
        run: ruff check
  test: 
    name: Test the Python package 
    runs-on: ${{matrix.platform}}
    strategy: 
      matrix: 
       python-version: ["3.10", "3.14"]
       platform: [ubuntu-latest, macos-latest, windows-latest]
       include: 
        - python-version: "3.13"
          platform: "macos-15"
    needs: linting
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Assign Python version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version}}
      - name: Install the package
        run: pip install .[test]
      - name: Run the tests
        run: pytest -vv # Very verbose