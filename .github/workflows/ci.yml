name: My CI workflow

on: 
  push:    
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs: 
  hello: 
    name: My Hello job
    runs-on: ubuntu-latest 
    steps:
      - name: Print Hello world
        id: hello-step
        run: | 
          echo "Hello World"
          echo "message='My message'" >> $GITHUB_OUTPUT 
      - name: Second step 
        run: |
          echo "Second"
          echo ${{steps.hello-step.outputs.message}}
  
  goodbye: 
    name: My Farewell job
    needs: hello
    runs-on: windows-latest
    steps: 
      - name: Print farewell 
        run: echo "Goodbye"

  # lint: 
  #   name: Run the linter
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout repo
  #       uses: actions/checkout@v6
  #     - name: Run Ruff
  #       uses: astral-sh/ruff/
  test: 
    name: Test the Python package 
    runs-on: ${{matrix.platform}}
    strategy: 
      matrix: 
       python-version: ["3.10", "3.14"]
       platform: [ubuntu-latest, macos-latest, windows-latest]
       include: 
        - python-version: "3.13"
          platform: "macos-15"
    # needs: lint
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Assign Python version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version}}
      - name: Install the package
        run: pip install .[test]
      - if: matrix.python-version == '3.14'
        name: Conditional step 
        run: echo "Using Python 3.14"
      - if: runner.os == 'Linux'
        run: echo "This is Linux"
      - name: Run the tests
        run: pytest -vv # Very verbose