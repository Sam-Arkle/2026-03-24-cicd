name: My CI workflow

on: 
  push:    


jobs: 
  hello: 
    name: My Hello job
    runs-on: ubuntu-latest 
    steps:
      - name: Print Hello world
        run: echo "Hello World" 
      - name: Second step 
        run: echo "Second"
  
  goodbye: 
    name: My Farewell job
    needs: hello
    runs-on: windows-latest
    steps: 
      - name: Print farewell 
        run: echo "Goodbye"

  test: 
    name: Test the Python package 
    runs-on: ubuntu-latest
    steps:
      - name: Install the package
        run: pip install .[test]
      - name: Run the tests
        run: pytest -vv # Very verbose